name: "Artifact Storage Cleanup"

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at midnight
  workflow_dispatch: # Allow manual triggering from Actions UI

jobs:
  delete-artifacts:
    runs-on: ubuntu-latest
    permissions:
      actions: write # Required to delete artifacts
    steps:
      - name: "Delete all artifacts"
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner,
              repo,
              per_page: 100
            });
            
            if (artifacts.data.total_count === 0) {
              console.log("No artifacts found to delete.");
              return;
            }

            for (const artifact of artifacts.data.artifacts) {
              console.log(`Deleting artifact: ${artifact.name} (ID: ${artifact.id})`);
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: artifact.id
              });
            }
            console.log("Cleanup complete!");
