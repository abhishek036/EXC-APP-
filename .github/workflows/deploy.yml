name: Deploy Excellence Backend

on:
  push:
    branches: [ main ] # This triggers whenever you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: excellence-backend/package-lock.json

      - name: Build backend artifact on runner
        run: |
          set -euo pipefail
          cd excellence-backend
          npm ci
          npx prisma generate
          npm run build
          tar -czf backend-release.tgz dist prisma package.json package-lock.json

      - name: Upload release artifact to droplet
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          source: excellence-backend/backend-release.tgz
          target: ~/EXC-APP-/excellence-backend/
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          script_stop: true
          script: |
            set -euo pipefail

            # 1. Navigate to project folder
            cd ~/EXC-APP-/excellence-backend
            
            # 2. Pull latest code from GitHub
            git pull origin main

            # 3. Apply built artifact from CI runner
            tar -xzf backend-release.tgz
            rm -f backend-release.tgz
            
            # 4. Install runtime dependencies and sync database schema
            npm ci --omit=dev --no-audit --no-fund
            npx prisma generate
            npx prisma migrate deploy
            
            # 5. Restart the live process
            pm2 restart excellence-backend --update-env

            # 6. Health check (fail deployment if app is not up)
            curl -fsS http://127.0.0.1:3000/health >/dev/null
