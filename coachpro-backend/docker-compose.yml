version: '3.9'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://coachpro_admin:secure_dev_password@postgres:5432/coachpro
      REDIS_URL: redis://:secure_redis_password@redis:6379
      PORT: 3000
    depends_on:
      - postgres
      - redis
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy || npx prisma db push; node dist/server.js"

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: coachpro
      POSTGRES_USER: coachpro_admin
      POSTGRES_PASSWORD: secure_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass secure_redis_password
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data:
