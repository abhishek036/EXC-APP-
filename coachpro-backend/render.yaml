services:
  - type: web
    name: coachpro-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: coachpro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FIREBASE_ADMIN_DISABLED
        value: false
      - key: FIREBASE_PROJECT_ID
        value: excellence-academy-9154a
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: APP_MIN_VERSION_ANDROID
        value: 1.0.0
      - key: APP_LATEST_VERSION_ANDROID
        value: 1.0.0
      - key: APP_STORE_URL_ANDROID
        value: https://play.google.com/store/apps/details?id=com.coachpro.app
      - key: APP_MIN_VERSION_IOS
        value: 1.0.0
      - key: APP_LATEST_VERSION_IOS
        value: 1.0.0
      - key: APP_STORE_URL_IOS
        value: https://apps.apple.com/app/id0000000000

databases:
  - name: coachpro-db
    plan: free
    databaseName: coachpro
    user: coachpro_user
