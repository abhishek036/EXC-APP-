services:
  - type: web
    name: coachpro-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: coachpro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: coachpro-db
    plan: free
    databaseName: coachpro
    user: coachpro_user
