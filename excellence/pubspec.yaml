name: excellence
description: "Excellence Academy — Coaching Institute Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ─────────────────────────────────────
  flutter_bloc: ^9.1.1
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8

  # ── Firebase ───────────────────────────────────────────
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2
  flutter_local_notifications: ^19.4.1
  
  # ── Navigation ───────────────────────────────────────────
  go_router: ^17.1.0

  # ── Dependency Injection ─────────────────────────────────
  get_it: ^9.2.1

  # ── Network ──────────────────────────────────────────────
  dio: ^5.9.2
  http_parser: ^4.1.2
  connectivity_plus: ^7.0.0
  
    # ── Local Storage ────────────────────────────────────────

  # ── Local Storage ────────────────────────────────────────
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  open_filex: ^4.7.0

  # ── UI & Design ──────────────────────────────────────────
  google_fonts: ^8.0.2
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3
  gap: ^3.0.1
  fl_chart: ^1.1.1

  # ── Media & Files ────────────────────────────────────────
  image_picker: ^1.2.1
  file_picker: ^10.3.10
  flutter_image_compress: ^2.3.0
  permission_handler: ^11.3.1

  # ── PDF & Printing ──────────────────────────────────────
  pdf: ^3.11.3
  printing: ^5.14.2

  # ── Sharing & Utils ─────────────────────────────────────
  share_plus: ^12.0.1
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  intl: ^0.20.2
  timeago: ^3.7.1
  uuid: ^4.5.3
  dartz: ^0.10.1

  # ── Excel Import ────────────────────────────────────────
  excel: ^4.0.6

  # ── Socket for Chat ─────────────────────────────────────
  socket_io_client: ^3.1.4

  # ── Provider (for simple state) ─────────────────────────
  provider: ^6.1.5+1
  google_sign_in: ^7.2.0
  firebase_auth: ^6.3.0
  flutter_inappwebview: ^6.1.5
  apivideo_live_stream: ^1.2.0
  firebase_storage: ^13.2.0
  path: ^1.9.1
  dio_cache_interceptor: ^3.5.1
  dio_cache_interceptor_hive_store: ^4.0.0
  youtube_player_iframe: ^5.2.2
  webview_flutter_web: ^0.2.3+4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/images/logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/logo.png

flutter_native_splash:
  color: "#ffe46e"
  image: assets/images/splash_logo.png
  branding: assets/images/splash_tagline.png
  branding_bottom_padding: 240
  android_12:
    color: "#ffe46e"
    image: assets/images/splash_logo.png
  web: false
  fullscreen: true

